<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    color: #1a1a2e;
    -webkit-font-smoothing: antialiased;
    padding: 20px 12px;
  }
  .app {
    max-width: 480px;
    margin: 0 auto;
    background: rgba(255, 255, 255, 0.98);
    border-radius: 28px;
    box-shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.35);
    overflow: hidden;
    min-height: calc(100vh - 40px);
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .screen { flex: 1; padding: 24px 20px; overflow-y: auto; }
  .hidden { display: none !important; }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
    gap: 10px;
  }
  .header h1 {
    font-size: 26px;
    font-weight: 800;
    background: linear-gradient(135deg, #667eea, #f093fb);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
  }
  .header p { font-size: 13px; color: #6b7280; margin-top: 2px; }
  .icon-btn {
    width: 40px; height: 40px;
    border-radius: 14px;
    border: none;
    background: #f3f4f6;
    color: #4b5563;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .icon-btn:hover { background: #e5e7eb; transform: translateY(-1px); }
  .icon-btn.active {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
  }

  /* STATS */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 22px;
  }
  .stat {
    background: white;
    border-radius: 16px;
    padding: 14px 12px;
    border: 1px solid #f3f4f6;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .stat-label {
    font-size: 11px;
    color: #9ca3af;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-weight: 600;
    display: flex; align-items: center; gap: 4px;
    margin-bottom: 4px;
  }
  .stat-value { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .stat.streak .stat-value { color: #f97316; }
  .stat.xp .stat-value { color: #eab308; }
  .stat.mastered .stat-value { color: #10b981; }

  /* SECTION LABEL */
  .section-label {
    font-size: 11px;
    color: #9ca3af;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 700;
    margin-bottom: 10px;
    margin-top: 4px;
  }

  /* WORD SET CARDS */
  .set-grid { display: grid; gap: 10px; margin-bottom: 22px; }
  .set-card {
    background: white;
    border: 2px solid transparent;
    border-radius: 18px;
    padding: 14px 16px;
    cursor: pointer;
    display: flex; align-items: center; gap: 14px;
    transition: all 0.2s;
    text-align: left;
    width: 100%;
    font-family: inherit;
  }
  .set-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
  .set-card.active {
    border-color: #667eea;
    background: linear-gradient(135deg, rgba(102,126,234,0.08), rgba(240,147,251,0.08));
  }
  .set-icon {
    width: 48px; height: 48px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    flex-shrink: 0;
  }
  .set-info { flex: 1; min-width: 0; }
  .set-name { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
  .set-desc { font-size: 12px; color: #6b7280; }

  /* LEVEL CARDS */
  .level-grid { display: grid; gap: 10px; }
  .level-card {
    background: white;
    border: 1px solid #f3f4f6;
    border-radius: 18px;
    padding: 14px 16px;
    cursor: pointer;
    display: flex; align-items: center; gap: 14px;
    transition: all 0.2s;
    text-align: left;
    width: 100%;
    font-family: inherit;
  }
  .level-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
  .level-badge {
    width: 48px; height: 48px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800;
    font-size: 14px;
    color: white;
    flex-shrink: 0;
    letter-spacing: 0.5px;
  }
  .level-info { flex: 1; min-width: 0; }
  .level-header { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
  .level-name { font-size: 14px; font-weight: 700; }
  .level-tag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 999px;
    font-weight: 600;
    background: linear-gradient(135deg, #f093fb, #667eea);
    color: white;
    letter-spacing: 0.3px;
  }
  .level-count { font-size: 11px; color: #9ca3af; }
  .progress-row { display: flex; align-items: center; gap: 8px; }
  .progress-bar {
    flex: 1; height: 6px;
    background: #f3f4f6;
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 999px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .progress-text {
    font-size: 11px;
    color: #6b7280;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    min-width: 42px;
    text-align: right;
  }
  .chevron { color: #d1d5db; flex-shrink: 0; }

  /* STUDY SCREEN */
  .study-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    gap: 8px;
  }
  .back-btn {
    background: transparent; border: none; cursor: pointer;
    display: flex; align-items: center; gap: 4px;
    color: #6b7280; font-size: 14px; padding: 6px 8px;
    border-radius: 10px;
    font-family: inherit;
  }
  .back-btn:hover { background: #f3f4f6; }
  .level-pill {
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    color: white;
    letter-spacing: 0.3px;
  }
  .top-actions { display: flex; gap: 6px; }
  .top-action {
    width: 36px; height: 36px;
    border-radius: 10px;
    border: none;
    background: #f3f4f6;
    color: #6b7280;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .top-action:hover { background: #e5e7eb; }
  .top-action.on {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
  }

  .global-progress {
    height: 4px;
    background: #f3f4f6;
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 18px;
  }

  /* FLASHCARD */
  .flashcard {
    background: white;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    cursor: pointer;
    position: relative;
    transition: transform 0.2s;
  }
  .flashcard:hover { transform: translateY(-2px); }
  .flashcard-image {
    width: 100%;
    height: 240px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .flashcard-image::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,0.4) 2px, transparent 2px),
      radial-gradient(circle at 80% 70%, rgba(255,255,255,0.3) 3px, transparent 3px),
      radial-gradient(circle at 50% 90%, rgba(255,255,255,0.35) 2px, transparent 2px),
      radial-gradient(circle at 90% 20%, rgba(255,255,255,0.3) 2px, transparent 2px);
    background-size: 90px 90px, 120px 120px, 70px 70px, 100px 100px;
    opacity: 0.9;
  }
  .glyph {
    font-size: 110px;
    line-height: 1;
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 6px 16px rgba(0,0,0,0.15));
  }
  .photo-img {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 2;
  }
  .fav-btn {
    position: absolute;
    top: 12px; right: 12px;
    width: 40px; height: 40px;
    border: none;
    border-radius: 50%;
    background: rgba(255,255,255,0.95);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(10px);
    z-index: 3;
    transition: transform 0.2s;
  }
  .fav-btn:hover { transform: scale(1.1); }
  .status-pill {
    position: absolute;
    top: 14px; left: 14px;
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    z-index: 3;
  }
  .status-pill.mastered { color: #059669; }
  .status-pill.learning { color: #d97706; }
  .status-pill.hard { color: #dc2626; }

  .card-body { padding: 20px 22px 24px; }
  .card-front { text-align: center; padding: 8px 0 4px; }
  .word-row {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; margin-bottom: 6px;
  }
  .word {
    font-size: 30px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: #1a1a2e;
  }
  .word-sm { font-size: 22px; }
  .speak-btn {
    width: 34px; height: 34px;
    border: none;
    border-radius: 50%;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s;
  }
  .speak-btn:hover { transform: scale(1.1); }
  .speak-btn.small { width: 28px; height: 28px; }
  .ipa {
    font-family: 'SF Mono', Consolas, monospace;
    font-size: 14px;
    color: #6b7280;
    margin-bottom: 6px;
  }
  .pos {
    display: inline-block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #9ca3af;
    font-weight: 700;
    padding: 3px 10px;
    background: #f3f4f6;
    border-radius: 999px;
    margin-bottom: 14px;
  }
  .hint { font-size: 11px; color: #9ca3af; }

  .card-back { }
  .back-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .back-meta {
    font-size: 12px;
    color: #6b7280;
    font-family: 'SF Mono', Consolas, monospace;
    margin-bottom: 14px;
  }
  .back-meta i { font-family: inherit; font-style: italic; }
  .definition {
    font-size: 15px;
    line-height: 1.55;
    margin-bottom: 12px;
    color: #1a1a2e;
  }
  .example {
    padding: 12px 14px;
    background: linear-gradient(135deg, rgba(102,126,234,0.06), rgba(240,147,251,0.06));
    border-left: 3px solid #667eea;
    border-radius: 10px;
    font-size: 14px;
    font-style: italic;
    color: #4b5563;
    line-height: 1.5;
    margin-bottom: 14px;
    display: flex; align-items: flex-start; gap: 10px;
  }
  .example-text { flex: 1; }
  .example-speak {
    width: 30px; height: 30px;
    border: none;
    background: white;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #667eea;
    flex-shrink: 0;
    box-shadow: 0 2px 6px rgba(0,0,0,0.06);
  }

  .translations-toggle {
    display: inline-flex;
    align-items: center; gap: 6px;
    background: #f3f4f6;
    border: none;
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    color: #4b5563;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .translations-toggle:hover { background: #e5e7eb; }
  .translations {
    margin-top: 10px;
    display: grid; gap: 8px;
  }
  .translation {
    padding: 10px 14px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .translation.ar { background: linear-gradient(135deg, #ddd6fe, #e9d5ff); }
  .translation.zh { background: linear-gradient(135deg, #fce7f3, #fbcfe8); }
  .translation-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .translation.ar .translation-label { color: #5b21b6; }
  .translation.zh .translation-label { color: #9f1239; }
  .translation-text {
    font-size: 18px;
    font-weight: 700;
  }
  .translation.ar .translation-text { color: #4c1d95; }
  .translation.zh .translation-text { color: #831843; }

  /* ACTIONS */
  .actions {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 16px;
  }
  .action {
    padding: 14px 8px;
    border: none;
    border-radius: 14px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    display: flex; align-items: center; justify-content: center; gap: 4px;
    transition: transform 0.15s;
  }
  .action:hover { transform: translateY(-2px); }
  .action.hard {
    background: linear-gradient(135deg, #fecaca, #fca5a5);
    color: #991b1b;
  }
  .action.learning {
    background: linear-gradient(135deg, #fed7aa, #fdba74);
    color: #9a3412;
  }
  .action.mastered {
    background: linear-gradient(135deg, #a7f3d0, #6ee7b7);
    color: #065f46;
  }

  .nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 16px;
  }
  .nav-btn {
    background: white;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 8px 14px;
    font-size: 13px;
    color: #6b7280;
    cursor: pointer;
    display: flex; align-items: center; gap: 4px;
    font-family: inherit;
  }
  .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .nav-hint { font-size: 11px; color: #9ca3af; }

  /* RESULTS */
  .results-wrap { text-align: center; padding: 20px 0; }
  .trophy {
    width: 90px; height: 90px;
    border-radius: 50%;
    background: linear-gradient(135deg, #f093fb, #667eea);
    margin: 0 auto 20px;
    display: flex; align-items: center; justify-content: center;
    color: white;
    box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
  }
  .results-title {
    font-size: 24px;
    font-weight: 800;
    margin-bottom: 6px;
  }
  .results-sub { font-size: 13px; color: #6b7280; margin-bottom: 24px; }
  .results-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 24px;
  }
  .rstat { border-radius: 14px; padding: 14px 10px; }
  .rstat.mastered { background: linear-gradient(135deg, #a7f3d0, #6ee7b7); color: #065f46; }
  .rstat.learning { background: linear-gradient(135deg, #fed7aa, #fdba74); color: #9a3412; }
  .rstat.hard { background: linear-gradient(135deg, #fecaca, #fca5a5); color: #991b1b; }
  .rstat-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; }
  .rstat-value { font-size: 28px; font-weight: 800; }

  .btn-primary {
    padding: 14px 20px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    width: 100%;
    font-family: inherit;
    box-shadow: 0 4px 12px rgba(102, 126, 234, 0.35);
    transition: transform 0.2s;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5); }
  .btn-secondary {
    padding: 12px 20px;
    background: white;
    color: #4b5563;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    width: 100%;
    font-family: inherit;
    margin-top: 8px;
  }
  .btn-secondary:hover { background: #f9fafb; }
  .btn-text {
    padding: 10px 20px;
    background: transparent;
    color: #9ca3af;
    border: none;
    cursor: pointer;
    font-size: 13px;
    width: 100%;
    font-family: inherit;
    margin-top: 4px;
  }

  /* QUIZ */
  .quiz-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .quiz-counter { font-size: 13px; color: #6b7280; font-weight: 600; }
  .quiz-score {
    display: flex; align-items: center; gap: 4px;
    padding: 6px 12px;
    background: linear-gradient(135deg, #fef3c7, #fde68a);
    border-radius: 999px;
    font-size: 13px;
    font-weight: 700;
    color: #92400e;
  }
  .quiz-question {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 14px;
    color: #1a1a2e;
  }
  .quiz-picture {
    width: 100%;
    height: 200px;
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .quiz-picture .glyph { font-size: 100px; }
  .quiz-word-prompt {
    text-align: center;
    padding: 22px 18px;
    background: linear-gradient(135deg, rgba(102,126,234,0.08), rgba(240,147,251,0.08));
    border-radius: 20px;
    margin-bottom: 16px;
    display: flex; align-items: center; justify-content: center; gap: 12px;
  }
  .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .quiz-opt {
    padding: 14px 10px;
    background: white;
    border: 2px solid #f3f4f6;
    border-radius: 14px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    display: flex; align-items: center; justify-content: space-between;
    gap: 6px;
    transition: all 0.2s;
  }
  .quiz-opt:hover:not(:disabled) { transform: translateY(-2px); border-color: #667eea; }
  .quiz-opt.correct { background: linear-gradient(135deg, #a7f3d0, #6ee7b7); border-color: #10b981; color: #065f46; }
  .quiz-opt.wrong { background: linear-gradient(135deg, #fecaca, #fca5a5); border-color: #ef4444; color: #991b1b; }
  .quiz-opt.dim { opacity: 0.35; }
  .quiz-opt-pic {
    padding: 0;
    height: 110px;
    overflow: hidden;
    border-radius: 14px;
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .quiz-opt-pic .glyph { font-size: 56px; }
  .quiz-check {
    position: absolute;
    top: 6px; right: 6px;
    width: 26px; height: 26px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: white;
  }
  .quiz-check.ok { background: #10b981; }
  .quiz-check.no { background: #ef4444; }

  .feedback {
    margin-top: 14px;
    padding: 12px 14px;
    border-radius: 14px;
    font-size: 13px;
    line-height: 1.5;
    margin-bottom: 10px;
  }
  .feedback.ok { background: linear-gradient(135deg, #a7f3d0, #6ee7b7); color: #065f46; }
  .feedback.no { background: linear-gradient(135deg, #fecaca, #fca5a5); color: #991b1b; }

  /* LOADING */
  .loading {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 60px 20px; color: #6b7280;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid #f3f4f6;
    border-top-color: #667eea;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* INFO BANNER */
  .info-banner {
    background: linear-gradient(135deg, rgba(102,126,234,0.1), rgba(240,147,251,0.1));
    border: 1px solid rgba(102,126,234,0.2);
    border-radius: 14px;
    padding: 10px 14px;
    font-size: 12px;
    color: #4b5563;
    margin-top: 14px;
    display: flex; align-items: flex-start; gap: 8px;
    line-height: 1.5;
  }
  .info-banner strong { color: #1a1a2e; }

  /* GRADIENT BACKGROUNDS FOR LEVEL BADGES */
  .grad-A1 { background: linear-gradient(135deg, #10b981, #84cc16); }
  .grad-A2 { background: linear-gradient(135deg, #84cc16, #eab308); }
  .grad-B1 { background: linear-gradient(135deg, #06b6d4, #3b82f6); }
  .grad-B2 { background: linear-gradient(135deg, #3b82f6, #8b5cf6); }
  .grad-C1 { background: linear-gradient(135deg, #8b5cf6, #ec4899); }
  .grad-C2 { background: linear-gradient(135deg, #ec4899, #f43f5e); }

  /* THEME BACKGROUNDS */

// Storage (localStorage for GitHub version)
const STORAGE_KEY = 'cefr-flashcards-v1';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      state.progress = data.progress || {};
      state.streak = data.streak || 0;
      state.lastStudied = data.lastStudied || null;
      state.favorites = data.favorites || [];
      state.xp = data.xp || 0;
      state.ttsEnabled = data.ttsEnabled !== false;
    }
  } catch (e) { console.warn('Load failed', e); }
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      progress: state.progress,
      streak: state.streak,
      lastStudied: state.lastStudied,
      favorites: state.favorites,
      xp: state.xp,
      ttsEnabled: state.ttsEnabled,
    }));
  } catch (e) { console.warn('Save failed', e); }
}

// Try to load photos from photos/ folder
// Photos are looked up by: photos/{set}/{level}/{word}.jpg (or .png, .webp)
async function resolvePhoto(setKey, level, word) {
  const key = `${setKey}/${level}/${word}`;
  if (state.photoMap[key] !== undefined) return state.photoMap[key];
  
  const extensions = ['jpg', 'jpeg', 'png', 'webp'];
  for (const ext of extensions) {
    const url = `photos/${setKey}/${level}/${word}.${ext}`;
    try {
      const res = await fetch(url, { method: 'HEAD' });
      if (res.ok) {
        state.photoMap[key] = url;
        return url;
      }
    } catch (e) {}
  }
  state.photoMap[key] = null;
  return null;
}

// TTS
function speak(text, rate = 0.9) {
  if (!state.ttsEnabled || !state.ttsAvailable) return;
  try {
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'en-US';
    utter.rate = rate;
    utter.pitch = 1;
    window.speechSynthesis.speak(utter);
  } catch (e) {}
}

function toggleTts() {
  state.ttsEnabled = !state.ttsEnabled;
  saveState();
  if (!state.ttsEnabled) window.speechSynthesis?.cancel();
  render();
}

function updateStreak() {
  const today = new Date().toDateString();
  if (state.lastStudied !== today) {
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    state.streak = state.lastStudied === yesterday ? state.streak + 1 : 1;
    state.lastStudied = today;
    saveState();
  }
}

// Stats helpers
function getLevelStats(setKey, level) {
  const cards = window.WORD_SETS?.[setKey]?.levels?.[level] || [];
  let mastered = 0, learning = 0, hard = 0;
  cards.forEach((_, idx) => {
    const status = state.progress[`${setKey}-${level}-${idx}`];
    if (status === 'mastered') mastered++;
    else if (status === 'learning') learning++;
    else if (status === 'hard') hard++;
  });
  return { mastered, learning, hard, total: cards.length };
}

function getSetStats(setKey) {
  let mastered = 0, total = 0;
  LEVELS.forEach(lvl => {
    const s = getLevelStats(setKey, lvl);
    mastered += s.mastered;
    total += s.total;
  });
  return { mastered, total };
}

function getCards(setKey, level) {
  const cards = window.WORD_SETS?.[setKey]?.levels?.[level] || [];
  if (state.shuffled && state.shuffledOrder) return state.shuffledOrder.map(i => cards[i]);
  return cards;
}

// ============ RENDER ============
function showScreen(id) {
  ['home', 'study', 'results', 'quiz', 'loading'].forEach(s => {
    document.getElementById(s + '-screen').classList.add('hidden');
  });
  document.getElementById(id + '-screen').classList.remove('hidden');
  state.screen = id;
  window.scrollTo(0, 0);
}

function renderHome() {
  // Stats
  const totalMastered = Object.values(state.progress).filter(p => p === 'mastered').length;
  document.getElementById('stat-streak').textContent = state.streak;
  document.getElementById('stat-xp').textContent = state.xp;
  document.getElementById('stat-mastered').textContent = totalMastered;

  // TTS toggle
  const ttsBtn = document.getElementById('tts-toggle');
  ttsBtn.classList.toggle('active', state.ttsEnabled);
  ttsBtn.innerHTML = state.ttsEnabled ? ICONS.volume.replace('14', '18').replace('14', '18') : ICONS.volumeOff.replace('14', '18').replace('14', '18');
  ttsBtn.onclick = toggleTts;

  // Word sets
  const setGrid = document.getElementById('set-grid');
  setGrid.innerHTML = '';
  Object.entries(window.WORD_SETS).forEach(([key, set]) => {
    const stats = getSetStats(key);
    const pct = Math.round((stats.mastered / stats.total) * 100);
    const isActive = state.currentSet === key;
    const btn = document.createElement('button');
    btn.className = 'set-card' + (isActive ? ' active' : '');
    btn.innerHTML = `
      <div class="set-icon" style="background: ${set.iconBg}; color: white;">${set.icon}</div>
      <div class="set-info">
        <div class="set-name">${set.name}</div>
        <div class="set-desc">${set.desc} · ${pct}% mastered</div>
      </div>
      ${isActive ? `<div style="color: #667eea;">${ICONS.check}</div>` : ''}
    `;
    btn.onclick = () => { state.currentSet = key; render(); };
    setGrid.appendChild(btn);
  });

  // Levels label
  document.getElementById('levels-label').textContent = `Levels · ${window.WORD_SETS[state.currentSet].name}`;

  // Level cards
  const levelGrid = document.getElementById('level-grid');
  levelGrid.innerHTML = '';
  LEVELS.forEach(level => {
    const info = LEVEL_INFO[level];
    const stats = getLevelStats(state.currentSet, level);
    const pct = Math.round((stats.mastered / stats.total) * 100);
    const hasTranslations = level === 'A1' || level === 'A2';
    const btn = document.createElement('button');
    btn.className = 'level-card';
    btn.innerHTML = `
      <div class="level-badge ${info.class}">${level}</div>
      <div class="level-info">
        <div class="level-header">
          <span class="level-name">${info.name}</span>
          ${hasTranslations ? '<span class="level-tag">AR · 中</span>' : ''}
          <span class="level-count">· ${stats.total} words</span>
        </div>
        <div class="progress-row">
          <div class="progress-bar">
            <div class="progress-fill ${info.class}" style="width: ${pct}%;"></div>
          </div>
          <div class="progress-text">${stats.mastered}/${stats.total}</div>
        </div>
      </div>
      <span class="chevron">${ICONS.chevronRight}</span>
    `;
    btn.onclick = () => startStudying(level);
    levelGrid.appendChild(btn);
  });

  // Favorites
  const favContainer = document.getElementById('fav-count-container');
  favContainer.innerHTML = state.favorites.length > 0 
    ? `<div class="fav-count">${ICONS.heart.replace('18', '14').replace('18', '14')} ${state.favorites.length} favorited ${state.favorites.length === 1 ? 'word' : 'words'}</div>`
    : '';
}

function startStudying(level) {
  const cards = getCards(state.currentSet, level);
  if (!cards.length) {
    const screen = document.getElementById('study-screen');
    screen.innerHTML = `
      <div class="error-box">
        <h3>No cards found for this level</h3>
        <p>Please add words for <code>${state.currentSet}/${level}</code> in <code>words.js</code> or <code>index.html</code>.</p>
      </div>
    `;
    showScreen('study');
    return;
  }
  state.currentLevel = level;
  state.cardIndex = 0;
  state.flipped = false;
  state.shuffled = false;
  state.shuffledOrder = null;
  state.showTranslations = false;
  render();
  showScreen('study');
}

function handleShuffle() {
  const cards = getCards(state.currentSet, state.currentLevel);
  if (!cards.length) return;
  state.shuffledOrder = [...Array(cards.length).keys()].sort(() => Math.random() - 0.5);
  state.shuffled = true;
  state.cardIndex = 0;
  state.flipped = false;
  render();
}

function markCard(status) {
  const cards = getCards(state.currentSet, state.currentLevel);
  if (!cards.length) return;
  const actualIdx = state.shuffled && state.shuffledOrder ? state.shuffledOrder[state.cardIndex] : state.cardIndex;
  const key = `${state.currentSet}-${state.currentLevel}-${actualIdx}`;
  state.progress[key] = status;
  state.xp += status === 'mastered' ? 10 : status === 'learning' ? 3 : 2;
  updateStreak();
  saveState();
  
  if (state.cardIndex < cards.length - 1) {
    state.cardIndex++;
    state.flipped = false;
    render();
  } else {
    renderResults();
    showScreen('results');
  }
}

function toggleFavorite() {
  const actualIdx = state.shuffled && state.shuffledOrder ? state.shuffledOrder[state.cardIndex] : state.cardIndex;
  const key = `${state.currentSet}-${state.currentLevel}-${actualIdx}`;
  state.favorites = state.favorites.includes(key) 
    ? state.favorites.filter(f => f !== key)
    : [...state.favorites, key];
  saveState();
  render();
}

async function renderStudy() {
  const cards = getCards(state.currentSet, state.currentLevel);
  const card = cards[state.cardIndex];
  if (!card) {
    const screen = document.getElementById('study-screen');
    screen.innerHTML = `
      <div class="error-box">
        <h3>Could not load this card</h3>
        <p>The selected level appears empty or invalid. Please go back and choose another level.</p>
        <button class="btn-primary" id="fallback-home">Back to home</button>
      </div>
    `;
    document.getElementById('fallback-home').onclick = () => {
      state.currentLevel = null;
      state.cardIndex = 0;
      state.flipped = false;
      renderHome();
      showScreen('home');
    };
    return;
  }
  const actualIdx = state.shuffled && state.shuffledOrder ? state.shuffledOrder[state.cardIndex] : state.cardIndex;
  const cardKey = `${state.currentSet}-${state.currentLevel}-${actualIdx}`;
  const isFavorite = state.favorites.includes(cardKey);
  const status = state.progress[cardKey] || 'new';
  const hasTranslations = state.currentLevel === 'A1' || state.currentLevel === 'A2';
  const info = LEVEL_INFO[state.currentLevel];

  // Try to load photo
  const photoUrl = await resolvePhoto(state.currentSet, state.currentLevel, card.word);

  const screen = document.getElementById('study-screen');
  screen.innerHTML = `
    <div class="study-top">
      <button class="back-btn" id="back-to-home">${ICONS.chevronLeft} Home</button>
      <div class="level-pill ${info.class}">${state.currentLevel} · ${state.cardIndex + 1}/${cards.length}</div>
      <div class="top-actions">
        ${state.ttsAvailable ? `<button class="top-action ${state.ttsEnabled ? 'on' : ''}" id="toggle-tts">${state.ttsEnabled ? ICONS.volume : ICONS.volumeOff}</button>` : ''}
        <button class="top-action ${state.shuffled ? 'on' : ''}" id="shuffle-btn">${ICONS.shuffle}</button>
      </div>
    </div>
    <div class="global-progress">
      <div class="progress-fill ${info.class}" style="width: ${((state.cardIndex + 1) / cards.length) * 100}%;"></div>
    </div>

    <div class="flashcard" id="flashcard">
      <div class="flashcard-image theme-${card.theme}">
        ${photoUrl ? `<img class="photo-img" src="${photoUrl}" alt="${card.word}" onerror="this.style.display='none'">` : ''}
        <div class="glyph">${card.glyph}</div>
        <button class="fav-btn" id="fav-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="${isFavorite ? '#ec4899' : 'none'}" stroke="${isFavorite ? '#ec4899' : '#6b7280'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </button>
        ${status !== 'new' ? `<div class="status-pill ${status}">${status}</div>` : ''}
      </div>
      <div class="card-body">
        ${state.flipped ? `
          <div class="card-back">
            <div class="back-header">
              <div class="word word-sm">${card.word}</div>
              ${state.ttsAvailable && state.ttsEnabled ? `<button class="speak-btn small" id="speak-word">${ICONS.volume}</button>` : ''}
            </div>
            <div class="back-meta">${card.ipa} · <i>${card.pos}</i></div>
            <div class="definition">${card.def}</div>
            <div class="example">
              <div class="example-text">"${card.example}"</div>
              ${state.ttsAvailable && state.ttsEnabled ? `<button class="example-speak" id="speak-example">${ICONS.volume}</button>` : ''}
            </div>
            ${hasTranslations ? `
              <button class="translations-toggle" id="toggle-translations">${ICONS.globe} ${state.showTranslations ? 'Hide translations' : 'Show translations'}</button>
              ${state.showTranslations ? `
                <div class="translations">
                  <div class="translation ar">
                    <div class="translation-label">العربية</div>
                    <div class="translation-text" dir="rtl">${card.ar}</div>
                  </div>
                  <div class="translation zh">
                    <div class="translation-label">中文</div>
                    <div class="translation-text">${card.zh}</div>
                  </div>
                </div>
              ` : ''}
            ` : ''}
          </div>
        ` : `
          <div class="card-front">
            <div class="word-row">
              <div class="word">${card.word}</div>
              ${state.ttsAvailable && state.ttsEnabled ? `<button class="speak-btn" id="speak-word">${ICONS.volume}</button>` : ''}
            </div>
            <div class="ipa">${card.ipa}</div>
            <div class="pos">${card.pos}</div>
            <div class="hint">Tap card to reveal</div>
          </div>
        `}
      </div>
    </div>

    ${state.flipped ? `
      <div class="actions">
        <button class="action hard" id="mark-hard">Hard</button>
        <button class="action learning" id="mark-learning">Learning</button>
        <button class="action mastered" id="mark-mastered">${ICONS.check} Mastered</button>
      </div>
    ` : `
      <div class="nav">
        <button class="nav-btn" id="prev-btn" ${state.cardIndex === 0 ? 'disabled' : ''}>${ICONS.chevronLeft} Prev</button>
        <div class="nav-hint">Tap to see details</div>
        <button class="nav-btn" id="next-btn" ${state.cardIndex === cards.length - 1 ? 'disabled' : ''}>Next ${ICONS.chevronRight}</button>
      </div>
    `}
  `;

  // Bind events
  document.getElementById('back-to-home').onclick = () => { state.flipped = false; window.speechSynthesis?.cancel(); render(); showScreen('home'); };
  document.getElementById('flashcard').onclick = () => { state.flipped = !state.flipped; render(); };
  document.getElementById('fav-btn').onclick = (e) => { e.stopPropagation(); toggleFavorite(); };
  if (document.getElementById('toggle-tts')) document.getElementById('toggle-tts').onclick = toggleTts;
  document.getElementById('shuffle-btn').onclick = handleShuffle;
  
  if (document.getElementById('speak-word')) document.getElementById('speak-word').onclick = (e) => { e.stopPropagation(); speak(card.word); };
  if (document.getElementById('speak-example')) document.getElementById('speak-example').onclick = (e) => { e.stopPropagation(); speak(card.example); };
  if (document.getElementById('toggle-translations')) document.getElementById('toggle-translations').onclick = (e) => { e.stopPropagation(); state.showTranslations = !state.showTranslations; render(); };
  
  if (document.getElementById('mark-hard')) document.getElementById('mark-hard').onclick = (e) => { e.stopPropagation(); markCard('hard'); };
  if (document.getElementById('mark-learning')) document.getElementById('mark-learning').onclick = (e) => { e.stopPropagation(); markCard('learning'); };
  if (document.getElementById('mark-mastered')) document.getElementById('mark-mastered').onclick = (e) => { e.stopPropagation(); markCard('mastered'); };
  
  if (document.getElementById('prev-btn')) document.getElementById('prev-btn').onclick = (e) => { e.stopPropagation(); if (state.cardIndex > 0) { state.cardIndex--; state.flipped = false; render(); }};
  if (document.getElementById('next-btn')) document.getElementById('next-btn').onclick = (e) => { e.stopPropagation(); if (state.cardIndex < cards.length - 1) { state.cardIndex++; state.flipped = false; render(); }};
}

function renderResults() {
  const stats = getLevelStats(state.currentSet, state.currentLevel);
  const info = LEVEL_INFO[state.currentLevel];
  const screen = document.getElementById('results-screen');
  screen.innerHTML = `
    <div class="results-wrap">
      <div class="trophy">${ICONS.sparkles}</div>
      <div class="results-title">Session complete!</div>
      <div class="results-sub">${window.WORD_SETS[state.currentSet].name} · ${state.currentLevel}</div>
      <div class="results-stats">
        <div class="rstat mastered">
          <div class="rstat-label">Mastered</div>
          <div class="rstat-value">${stats.mastered}</div>
        </div>
        <div class="rstat learning">
          <div class="rstat-label">Learning</div>
          <div class="rstat-value">${stats.learning}</div>
        </div>
        <div class="rstat hard">
          <div class="rstat-label">Hard</div>
          <div class="rstat-value">${stats.hard}</div>
        </div>
      </div>
      <button class="btn-primary" id="start-quiz">${ICONS.zap} Take the quick quiz</button>
      <button class="btn-secondary" id="study-again">Study again</button>
      <button class="btn-text" id="back-home">Back to home</button>
    </div>
  `;
  document.getElementById('start-quiz').onclick = startQuiz;
  document.getElementById('study-again').onclick = () => startStudying(state.currentLevel);
  document.getElementById('back-home').onclick = () => { render(); showScreen('home'); };
}

function startQuiz() {
  const cards = getCards(state.currentSet, state.currentLevel);
  if (!cards.length) {
    renderHome();
    showScreen('home');
    return;
  }
  const numQuestions = Math.min(5, cards.length);
  const questionIndices = [...Array(cards.length).keys()].sort(() => Math.random() - 0.5).slice(0, numQuestions);
  state.quizQuestions = questionIndices.map(idx => {
    const correct = cards[idx];
    const wrongOptions = cards.filter((_, i) => i !== idx).sort(() => Math.random() - 0.5).slice(0, 3);
    const options = [correct, ...wrongOptions].sort(() => Math.random() - 0.5);
    const type = Math.random() > 0.5 ? 'word' : 'picture';
    return { correct, options, type };
  });
  state.quizIndex = 0;
  state.quizScore = 0;
  state.selectedAnswer = null;
  state.quizAnswered = false;
  renderQuiz();
  showScreen('quiz');
}

function answerQuiz(option) {
  if (state.quizAnswered) return;
  state.selectedAnswer = option;
  state.quizAnswered = true;
  const q = state.quizQuestions[state.quizIndex];
  if (option.word === q.correct.word) {
    state.quizScore++;
    state.xp += 5;
    saveState();
    speak(option.word);
  }
  renderQuiz();
}

function nextQuizQuestion() {
  if (state.quizIndex < state.quizQuestions.length - 1) {
    state.quizIndex++;
    state.selectedAnswer = null;
    state.quizAnswered = false;
    renderQuiz();
  } else {
    render();
    showScreen('home');
  }
}

async function renderQuiz() {
  const q = state.quizQuestions[state.quizIndex];
  const info = LEVEL_INFO[state.currentLevel];
  const screen = document.getElementById('quiz-screen');
  if (!q || !info) {
    screen.innerHTML = `
      <div class="error-box">
        <h3>Quiz is unavailable</h3>
        <p>We couldn't load quiz questions for this level. Please return home and start a new study session.</p>
        <button class="btn-primary" id="quiz-back-home">Back to home</button>
      </div>
    `;
    document.getElementById('quiz-back-home').onclick = () => {
      state.quizQuestions = [];
      state.quizIndex = 0;
      state.quizAnswered = false;
      state.selectedAnswer = null;
      renderHome();
      showScreen('home');
    };
    return;
  }

  // Load photo for correct answer if quiz is picture type
  let correctPhotoUrl = null;
  if (q.type === 'picture') {
    correctPhotoUrl = await resolvePhoto(state.currentSet, state.currentLevel, q.correct.word);
  }

  const optionsHtml = q.type === 'picture' 
    ? q.options.map(opt => {
        const isCorrect = opt.word === q.correct.word;
        const isSelected = state.selectedAnswer && state.selectedAnswer.word === opt.word;
        let cls = 'quiz-opt';
        if (state.quizAnswered) {
          if (isCorrect) cls += ' correct';
          else if (isSelected) cls += ' wrong';
        }
        return `
          <button class="${cls}" data-word="${opt.word}" ${state.quizAnswered ? 'disabled' : ''}>
            <span>${opt.word}</span>
            ${state.quizAnswered && isCorrect ? `<span style="color:#10b981;">${ICONS.check}</span>` : ''}
            ${state.quizAnswered && isSelected && !isCorrect ? `<span style="color:#ef4444;">${ICONS.x}</span>` : ''}
          </button>
        `;
      }).join('')
    : await Promise.all(q.options.map(async (opt) => {
        const isCorrect = opt.word === q.correct.word;
        const isSelected = state.selectedAnswer && state.selectedAnswer.word === opt.word;
        const optPhoto = await resolvePhoto(state.currentSet, state.currentLevel, opt.word);
        let cls = 'quiz-opt quiz-opt-pic theme-' + opt.theme;
        if (state.quizAnswered) {
          if (isCorrect) cls += ' correct';
          else if (isSelected) cls += ' wrong';
          else cls += ' dim';
        }
        return `
          <button class="${cls}" data-word="${opt.word}" ${state.quizAnswered ? 'disabled' : ''}>
            ${optPhoto ? `<img class="photo-img" src="${optPhoto}" alt="">` : ''}
            <div class="glyph">${opt.glyph}</div>
            ${state.quizAnswered && isCorrect ? `<div class="quiz-check ok">${ICONS.check}</div>` : ''}
            ${state.quizAnswered && isSelected && !isCorrect ? `<div class="quiz-check no">${ICONS.x}</div>` : ''}
          </button>
        `;
      })).then(arr => arr.join(''));

  screen.innerHTML = `
    <div class="quiz-top">
      <div class="quiz-counter">Question ${state.quizIndex + 1} of ${state.quizQuestions.length}</div>
      <div class="quiz-score">⭐ ${state.quizScore}</div>
    </div>
    <div class="global-progress">
      <div class="progress-fill ${info.class}" style="width: ${((state.quizIndex + 1) / state.quizQuestions.length) * 100}%;"></div>
    </div>

    ${q.type === 'picture' ? `
      <div class="quiz-question">Which word matches this picture?</div>
      <div class="quiz-picture theme-${q.correct.theme}">
        ${correctPhotoUrl ? `<img class="photo-img" src="${correctPhotoUrl}" alt="">` : ''}
        <div class="glyph">${q.correct.glyph}</div>
      </div>
      <div class="quiz-options">${optionsHtml}</div>
    ` : `
      <div class="quiz-question">Which picture matches this word?</div>
      <div class="quiz-word-prompt">
        <div>
          <div class="word word-sm">${q.correct.word}</div>
          <div class="ipa">${q.correct.ipa}</div>
        </div>
        ${state.ttsAvailable && state.ttsEnabled ? `<button class="speak-btn" id="quiz-speak">${ICONS.volume}</button>` : ''}
      </div>
      <div class="quiz-options">${optionsHtml}</div>
    `}

    ${state.quizAnswered ? `
      <div class="feedback ${state.selectedAnswer.word === q.correct.word ? 'ok' : 'no'}">
        ${state.selectedAnswer.word === q.correct.word 
          ? `✓ Correct! +5 XP. ${q.correct.def}` 
          : `✗ Answer: "${q.correct.word}" — ${q.correct.def}`}
      </div>
      <button class="btn-primary" id="quiz-next">${state.quizIndex < state.quizQuestions.length - 1 ? 'Next question' : 'Finish'}</button>
    ` : ''}
  `;

  // Bind events
  screen.querySelectorAll('.quiz-opt').forEach(btn => {
    btn.onclick = () => {
      const word = btn.getAttribute('data-word');
      const opt = q.options.find(o => o.word === word);
      answerQuiz(opt);
    };
  });
  if (document.getElementById('quiz-next')) document.getElementById('quiz-next').onclick = nextQuizQuestion;
  if (document.getElementById('quiz-speak')) document.getElementById('quiz-speak').onclick = () => speak(q.correct.word);
}

// Main render dispatcher
function render() {
  if (state.screen === 'home') { renderHome(); showScreen('home'); }
  else if (state.screen === 'study') { renderStudy(); showScreen('study'); }
  else if (state.screen === 'results') { renderResults(); showScreen('results'); }
  else if (state.screen === 'quiz') { renderQuiz(); showScreen('quiz'); }
  else { renderHome(); showScreen('home'); }
}

// Init
if (typeof window !== 'undefined' && 'speechSynthesis' in window) {
  state.ttsAvailable = true;
}
loadState();
render();
showScreen('home');
</script>
